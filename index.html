<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@400;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Oxanium',sans-serif;
    background:url('https://i.ibb.co/7x4vqZqd/image.jpg') no-repeat center center;
    background-size:cover;

    min-height:100dvh;
    display:flex;
    justify-content:center;
    align-items:center;

    padding:20px;
    overflow-x:hidden;
}

.glass-box{
    width:100%;
    max-width:420px;
    background:rgba(0,0,0,0.55);
    backdrop-filter:blur(8px);
    -webkit-backdrop-filter:blur(8px);
    padding:35px 30px;
    border-radius:18px;
    border:1px solid rgba(255,255,255,0.18);
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,.35);
}

.logo-img{
    width:130px;
    height:130px;
    border-radius:50%;
    border:3px solid #ffdb4d;
    box-shadow:0 0 18px #ffdb4d;
    object-fit:cover;
    margin-bottom:18px;
}

.title{
    font-size:32px;
    font-weight:700;
    color:#ffdb4d;
    text-shadow:0 0 15px #ffdb4d;
    margin-bottom:8px;
}

.sub-title{
    font-size:18px;
    color:#ffe26f;
    margin-bottom:25px;
    text-shadow:0 0 8px black;
}

.join-btn{
    display:block;
    width:100%;
    padding:16px;
    background:linear-gradient(90deg,#0088cc,#00a8ff);
    color:#fff;
    text-decoration:none;
    border-radius:12px;
    font-size:18px;
    font-weight:700;
    box-shadow:0 0 12px #00a8ff;
    margin-bottom:20px;
    transition:.3s;
    animation:pulse 1.7s infinite;
}

.join-btn:hover{
    transform:scale(1.03);
    box-shadow:0 0 20px #00c2ff;
}

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(.96);}
    100%{transform:scale(1);}
}

.highlight{
    color:#ffdb4d;
    padding:8px 14px;
    border:1px solid #ffdb4d;
    border-radius:8px;
    font-size:15px;
    margin:15px 0;
    box-shadow:0 0 12px rgba(255,219,77,.4);
}

p{
    color:#fff;
    text-shadow:0 0 8px black;
    margin:8px 0;
    font-size:16px;
}

footer{
    font-size:12px;
    color:#ccc;
    margin-top:15px;
}

.ad-box{
    margin-top:18px;
    background:linear-gradient(135deg,#4f46e5,#9333ea,#ec4899);
    padding:10px 14px;
    font-size:13px;
    color:#fff;
    border-radius:10px;
    display:inline-block;
    box-shadow:0 3px 12px rgba(0,0,0,.25);
    border:1px solid rgba(255,255,255,.18);
    animation:glow 2s infinite alternate;
}

.ad-box a{
    color:#6cb6ff;
    text-decoration:none;
    font-weight:700;
    margin:0 4px;
    border-bottom:1px solid rgba(108,182,255,.6);
}

@keyframes glow{
    from{box-shadow:0 0 8px #9333ea;}
    to{box-shadow:0 0 14px #ec4899;}
}

/* Tablet */
@media (max-width:768px){

    .glass-box{
        padding:25px 20px;
    }

    .logo-img{
        width:110px;
        height:110px;
    }

    .title{
        font-size:28px;
    }

    .sub-title{
        font-size:16px;
    }
}

/* Mobile */
@media (max-width:480px){

    body{
        min-height:100dvh;
        padding:12px;
    }

    .glass-box{
        max-width:380px;
        padding:20px 15px;
    }

    .logo-img{
        width:90px;
        height:90px;
    }

    .title{
        font-size:22px;
    }

    .sub-title{
        font-size:14px;
    }

    .join-btn{
        font-size:15px;
        padding:14px;
    }

    p{
        font-size:14px;
    }

    .highlight{
        font-size:13px;
    }
}

/* Desktop */
@media (min-width:1200px){

    .glass-box{
        max-width:500px;
        padding:45px;
    }

    .title{
        font-size:38px;
    }

    .sub-title{
        font-size:20px;
    }

    .logo-img{
        width:150px;
        height:150px;
    }
}
</style>
</head>
